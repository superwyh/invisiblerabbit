name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
    paths-ignore:
      - "NewIR/**"
      - "InvisibleRoom/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Ensure GitHub Pages files
        run: |
          if [ -f CNAME ]; then
            cp CNAME dist/CNAME
          fi
          if [ -f public/CNAME ]; then
            cp public/CNAME dist/CNAME
          fi
          touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment: github_pages
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
